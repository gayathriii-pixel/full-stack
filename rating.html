<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rating Page</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #1e1e2f, #2c3e50);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}.container { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 12px; text-align: center; width: 320px; box-shadow: 0 0 20px rgba(0,0,0,0.4); }

h1 { margin-bottom: 10px; color: orange; }

h2 { font-size: 16px; margin-bottom: 20px; color: #ddd; }

.stars { margin: 20px 0; }

.star { font-size: 40px; cursor: pointer; color: gray; transition: 0.2s; }

.star.active { color: orange; }

textarea { width: 100%; height: 90px; padding: 10px; border-radius: 8px; border: none; outline: none; margin-top: 10px; }

button { margin-top: 15px; padding: 10px 20px; border: none; background: orange; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; }

button:hover { background: darkorange; }

/* THANK YOU SCREEN */ #thankYou { display: none; text-align: center; }

#thankYou h1 { color: orange; font-size: 28px; } </style>

</head>
<body><div class="container" id="ratingBox">
  <h1>⭐ Rate Us</h1>
  <h2>How was your experience?</h2>  <div class="stars" id="stars">
    <span class="star">★</span>
    <span class="star">★</span>
    <span class="star">★</span>
    <span class="star">★</span>
    <span class="star">★</span>
  </div>  <textarea placeholder="Write feedback..."></textarea>  <br>
  <button onclick="submitRating()">Submit</button>
</div><!-- THANK YOU SCREEN --><div id="thankYou">
  <h1>🙏 Thanks for choosing our restaurant❤️</h1>
  <p>Taste the tripple joy 😋</p>
</div><script>
const stars = document.querySelectorAll('.star');

stars.forEach((star, index) => {
  star.addEventListener('click', () => {
    stars.forEach((s, i) => {
      s.classList.toggle('active', i <= index);
    });
  });
});

function submitRating(){
  document.getElementById("ratingBox").style.display = "none";
  document.getElementById("thankYou").style.display = "block";
}
</script></body>
</html>
