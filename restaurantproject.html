<!DOCTYPE html>
<html>
<head>
    <title>Restaurant</title>
    <link rel="icon" href="HTML/res.jpeg">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e1e2f, #2c3e50);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 80px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
        }

        img {
            width: 350px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.7);
        }

        button {
            margin-top: 30px;
            padding: 12px 25px;
            background: linear-gradient(to right, orange, gold);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: linear-gradient(to right, darkorange, orange);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Made with love 🫶 Served with care 😊</h1>

    <img src="welcome.jpeg">

    <br>

    <a href="login.html">
        <button>Login Now</button>
    </a>
</div>

</body>
</html>
